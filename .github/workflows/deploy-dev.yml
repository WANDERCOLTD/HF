name: Deploy to Staging
# #726 transition: targets the existing hf-admin-dev Cloud Run service. Phase 4
# renames the service to hf-admin-staging — this workflow's SERVICE env var
# will be updated at that time. Filename stays as deploy-dev.yml until then to
# preserve the repository_dispatch token reference.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'memory/**'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-dev, deploy-staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  PROJECT_ID: hf-admin-prod
  REGION: europe-west2
  REGISTRY: europe-west2-docker.pkg.dev/hf-admin-prod/hf-docker
  SERVICE: hf-admin-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/311250123759/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@hf-admin-prod.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry (Docker)
        uses: docker/login-action@v3
        with:
          registry: europe-west2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push runner image
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_APP_ENV=STAGING
            NODE_OPTIONS=--max-old-space-size=4096
          tags: |
            ${{ env.REGISTRY }}/hf-admin:dev
            ${{ env.REGISTRY }}/hf-admin:dev-${{ github.sha }}
          cache-from: type=gha,scope=runner-dev
          cache-to: type=gha,mode=max,scope=runner-dev

      - name: Build + push seed image
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          target: seed
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/hf-seed:dev
          cache-from: type=gha,scope=seed-dev
          cache-to: type=gha,mode=max,scope=seed-dev

      - name: Run schema migration
        run: |
          gcloud run jobs update hf-migrate-dev \
            --image=${{ env.REGISTRY }}/hf-seed:dev \
            --region=${{ env.REGION }}
          gcloud run jobs execute hf-migrate-dev \
            --region=${{ env.REGION }} --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}/hf-admin:dev \
            --region=${{ env.REGION }} \
            --no-cpu-throttling

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Testing $URL..."
          for i in $(seq 1 12); do
            if curl -sf "$URL/api/health" > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            echo "Waiting for service... (attempt $i/12)"
            sleep 5
          done
          curl -sf "$URL/api/health" | jq .
          curl -sf "$URL/api/ready" | jq .

      - name: Seed demo data
        continue-on-error: true
        run: |
          gcloud run jobs update hf-seed-dev \
            --image=${{ env.REGISTRY }}/hf-seed:dev \
            --set-env-vars=SEED_PROFILE=demo \
            --region=${{ env.REGION }}
          gcloud run jobs execute hf-seed-dev \
            --region=${{ env.REGION }} --wait
