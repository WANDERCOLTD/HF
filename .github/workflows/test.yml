name: Test Suite

on:
  pull_request:
  push:
    branches: [main, feature/*]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Lint and Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # #944 guard needs base ref reachable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Generate the Prisma client so tsc + lint see the current schema's
      # types. Without this, every Prisma model field shows up as a "Property
      # does not exist" tsc error, inflating the ratchet count by ~200 and
      # masking real regressions. Diagnosed during PR #1240 — the VM count
      # was 0, CI was 205, all phantom from a stale client.
      - name: Generate Prisma client
        run: npx prisma generate

      # #944 — block schema.prisma changes without a paired migration file.
      # Prevents the #931 / #1210 / #915 class of incident where schema-only
      # PRs land on main and every env that pulls starts 500ing with `P2022
      # column does not exist`. Runs BEFORE lint/tsc so the operator sees
      # the migration ask immediately, not buried under typecheck noise.
      - name: Block schema changes without paired migration (#944)
        working-directory: .
        run: scripts/check-schema-has-migration.sh

      - name: Run ESLint
        run: npm run lint

      # tsc carries hundreds of pre-existing errors from schema-rot in legacy
      # code paths (renamed Prisma models, removed compound keys, etc.).
      # Tracked for a focused cleanup epic. Surface as a warning in CI until
      # the cleanup PR lands; do not block the merge gate on accumulated debt
      # unrelated to the change under review.
      - name: TypeScript type check (informational)
        run: npx tsc --noEmit
        continue-on-error: true

      # Ratchet gate (#227) — fails the build if any of tsc_errors,
      # lint_errors, lint_warnings, or quarantined_tests goes UP vs the
      # baseline in .ratchet.json. Decreasing counts pass with a "lock the
      # win" hint. Started enforcing on 2026-05-14 after discovering that the
      # ratchet existed but wasn't wired into CI — by then tsc_errors had
      # drifted 574 → 625 silently. See PR for context.
      - name: Ratchet check (blocking — no new tsc/lint debt)
        run: npm run ratchet:check

      # knip — dead-code detection. Informational for now; a future PR will
      # add a ratchet on knip output to prevent regression. Surfaces unused
      # files, exports, and types so refactor-orphans (the bug pattern that
      # produced the #364 "0/0 modules" issue) are caught before merge.
      - name: knip dead-code check (informational)
        run: npm run knip:ci
        continue-on-error: true

      # API docs hygiene — currently fails on 1/439 missing annotation +
      # legacy invalid-format warnings. Warn-not-block until docs cleanup.
      - name: Validate API docs annotations
        run: npm run docs:api:validate
        continue-on-error: true

      - name: Check API docs are up to date
        run: npm run docs:api:check
        continue-on-error: true

      - name: Documentation health check
        run: npm run docs:health:ci
        continue-on-error: true

      # KNOWLEDGE-MAP.md ratchet (#601) — blocking on hard failures
      # (broken paths, unresolved slugs, role-count drift). The doc is the
      # repo-root translation layer between human language and HF concepts;
      # if its claims stop resolving, the doc misleads partners.
      - name: KNOWLEDGE-MAP.md ratchet
        run: npm run docs:knowledge-map:ci

      # AI-CAPABILITIES.md drift guard (#866). Blocking. The doc is
      # auto-derived from lib/chat/admin-tools.ts (the registry the AI
      # reads at every chat turn). If a tool is added/changed/removed
      # without regenerating, the doc silently lies — and humans rely
      # on it to know which Cmd+K calls exist. Regen with
      # `npm run docs:ai-capabilities`.
      - name: AI-CAPABILITIES.md drift guard
        run: npm run docs:ai-capabilities:check

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/admin/coverage/coverage-final.json
          flags: unit
          name: unit-tests
          fail_ci_if_error: false

      - name: Check coverage thresholds
        run: |
          # Extract coverage percentage from vitest output
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage is below 70% threshold"
            exit 1
          fi

  # Job 3: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hf_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hf_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # B0 part 1 — Domain backfill migration
      # (20260212_backfill_create_domain) closes ONE of the historical
      # gaps where Domain was only ever created via `prisma db push`.
      # The next missing table the chain trips on is Invite (the data
      # migration 20260213_migrate_user_roles_data UPDATEs it), so
      # continue-on-error STAYS until the rest of the db-push'd tables
      # (Invite, BddFeature, Institution, and more) get the same
      # treatment. Tracked as B0-followup.
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        continue-on-error: true

      # Seed depends on migrate. Keep continue-on-error until the rest
      # of the B0-followup db-push'd table backfills land.
      - name: Seed specs (required for journey tests)
        run: npx tsx prisma/seed-from-specs.ts
        continue-on-error: true

      # B8 — FK consistency check. Catches the cross-playbook FK-leak
      # class (#407 / #415), Anchor divergence, and IntakeSpec body/source
      # coherence drift before they reach dev. The script already runs
      # locally via `npm run ctl check`; this wires it into CI on the
      # ephemeral Postgres. Continue-on-error because the seed step above
      # can leave a partial schema until B0-followup lands; tighten this
      # to a real gate once seed is reliable.
      - name: FK consistency check (#415)
        run: npm run check:fk
        continue-on-error: true

      - name: Run integration tests
        run: npm run test:integration
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/admin/coverage/coverage-final.json
          flags: integration
          name: integration-tests
          fail_ci_if_error: false

  # Job 4: Build Check
  build:
    name: Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build runs Next.js's own type-check pass, which inherits the same
      # 576 pre-existing tsc errors. Same warn-not-block treatment as the
      # standalone tsc step until cleanup lands.
      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hf_test
          SKIP_ENV_VALIDATION: true
        continue-on-error: true

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh .next | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"

  # Summary job - all tests must pass
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed!"
