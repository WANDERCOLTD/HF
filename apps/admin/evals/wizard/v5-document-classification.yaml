        Comprehension Question Bank
        Passage: "The Black Death" (Year 6 Non-Fiction)
        Skills mapped to: KS2 Reading AFs 2, 3, 4, 6

        FOR TUTOR USE ONLY — This document contains model answers and tutor guidance.
        Do not share with pupils.

        How to use this bank:
        • Ask questions in order unless a pupil shows mastery — then skip ahead.
        • After each answer, locate the response on the tier ladder below and choose the next move.
        • Return to Emerging questions if a pupil slips back.

        === MIDDLE ===
