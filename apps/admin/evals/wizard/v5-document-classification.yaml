  # ── 3. Textbook chapter (worked examples ≠ ASSESSMENT) ────────────────────

  - description: "Textbook chapter with worked examples → TEXTBOOK (not ASSESSMENT)"
    vars:
      userMessage: |
        Filename: ks2-maths-textbook-chapter4-fractions.pdf

        Document sample (3 sections):

        === START ===
        Chapter 4: Understanding Fractions

        By the end of this chapter you will be able to:
        • identify and name fractions of shapes and quantities
        • compare and order fractions with different denominators
        • add and subtract fractions with the same denominator

        4.1 What is a Fraction?
        A fraction represents a part of a whole. When we divide a pizza into 4 equal slices and eat 1 slice, we have eaten one quarter — written as ¼.

        The number on the bottom (denominator) tells us how many equal parts the whole is divided into.
        The number on the top (numerator) tells us how many parts we are talking about.

        === MIDDLE ===
        4.3 Adding Fractions with the Same Denominator

        When the denominators are the same, we simply add the numerators and keep the denominator.

        Worked Example 1:
          ²/₅ + ¹/₅ = ³/₅
        We add the numerators (2 + 1 = 3) and keep the denominator (5).

        Worked Example 2:
          ³/₈ + ²/₈ = ⁵/₈
        Check: can you simplify? 5 and 8 share no common factors, so ⁵/₈ is already in its simplest form.

        Now try these yourself:
        a) ²/₇ + ³/₇ = ___    b) ¹/₆ + ⁴/₆ = ___    c) ⁵/₉ + ²/₉ = ___

        === END ===
        4.6 Chapter Summary

        In this chapter you have learned:
        ✓ A fraction has a numerator (top) and a denominator (bottom)
        ✓ To compare fractions, convert to a common denominator
        ✓ To add/subtract fractions: same denominator — just work with the numerators
        ✓ Mixed numbers combine a whole number and a fraction

        Chapter 4 Review Questions — try these before moving on to Chapter 5.
        (Answers on page 89)
