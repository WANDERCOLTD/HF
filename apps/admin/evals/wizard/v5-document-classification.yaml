        "What does the writer suggest about how people felt when the plague arrived?"

        Emerging response: "They were scared." / "Everyone died."
        Tutor next move: "What word or phrase in the text makes you think that? Point to it."

        Developing response: Pupil references a phrase but offers limited explanation.
          Example: "It says 'gripped by terror' which shows they were very frightened."
        Tutor next move: "Good — can you say WHY the writer used 'gripped'? What does that image suggest?"

        Secure response: Pupil selects precise language and explains the writer's intent.
          Example: "The phrase 'gripped by terror' personifies fear as a physical force — suggesting
          the population had no agency or escape, not just that they were afraid."
        Tutor next move: Affirm and move to Question 3.

        === END ===
        Question 5 (Vocabulary — AF6)
        "Find and explain the word 'virulent' in paragraph 3."

        Emerging: Pupil cannot locate the word or defines it as 'violent'.
        Tutor move: Read the sentence aloud, ask "what kind of word could fit here instead?"

        Developing: "It means very bad or harmful."
        Tutor move: "That's close — can you be more precise? What's virulent about a disease specifically?"

        Secure: "Virulent means extremely infectious and damaging — more intense than just 'harmful'.
